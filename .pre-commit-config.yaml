# Pre-commit hooks for PrivChain-MDD. See CLAUDE.md §3, §7, §8.
# Install with: pre-commit install
minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff           # lint
        args: [--fix]
      - id: ruff-format    # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: ["pydantic>=2.6"]
        args: [--strict]
        files: ^src/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key

  # Project-specific guard: block raw data / secrets from being committed.
  - repo: local
    hooks:
      - id: no-raw-data
        name: block raw data files (.wav/.mp4/.csv under data/)
        entry: python scripts/check_no_raw_data.py
        language: system
        pass_filenames: true
