# Real DAIC-WOZ / AVEC2017 data configuration (Phase 1).
#
# Used with: python scripts/train_baseline.py --daic-config configs/daic_woz.yaml
#
# The dataset is access-controlled (Data Use Agreement) and ~300 GB; download
# from https://dcapswoz.ict.usc.edu/ and extract each participant archive so the
# layout below holds. Model input dims are inferred from the real features at
# load time (see DaicWozDataset.feature_dims), so they are NOT set here.
#
# VERIFY the file templates and column names against your actual download before
# trusting results — see docs/architecture/ADR-0002-daic-woz-integration.md.

seed: 42

daic_woz:
  # Root containing per-participant folders (e.g. 300_P/, 301_P/, ...) and the
  # split label CSVs (paths below are resolved relative to this root).
  root: data/daic_woz
  phq8_max: 24

  participant_dir_template: "{pid}_P"

  splits:
    train: train_split_Depression_AVEC2017.csv
    dev: dev_split_Depression_AVEC2017.csv
    test: full_test_split.csv

  label_columns:
    participant_id: Participant_ID
    phq_binary: PHQ8_Binary
    phq_score: PHQ8_Score

  audio:
    file_template: "{pid}_COVAREP.csv"   # 74-dim COVAREP features, ~10ms frames
    has_header: false
    delimiter: ","
    max_frames: 1000                     # cap after subsampling
    frame_stride: 5                      # keep every 5th frame (~50ms)
    standardize: true

  video:
    file_template: "{pid}_CLNF_AUs.txt"  # OpenFace action units
    has_header: true
    delimiter: ","
    drop_columns: [frame, timestamp, confidence, success]  # OpenFace metadata cols
    max_frames: 1000
    frame_stride: 5
    standardize: true

  text:
    file_template: "{pid}_TRANSCRIPT.csv"
    delimiter: "\t"                      # DAIC-WOZ transcripts are tab-separated
    speaker_column: speaker
    value_column: value
    participant_speaker: Participant     # keep only the participant's turns
    vectorizer: hashing                  # hashing (offline) | tfidf (sklearn)
    dim: 512
